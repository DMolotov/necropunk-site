      width: 100%;

      user-select: none;
      pointer-events: none;
    }

    .fields-layer {
      position: absolute;
      inset: 0;
    }

    .pdf-field {
      position: absolute;
      margin: 0;
      border: 1px solid var(--field-border);
      background: var(--field-bg);
      border-radius: 2px;
      padding: 0.2em 0.28em;
      font-size: clamp(10px, 1.05vw, 14px);
      line-height: 1.2;
      color: #172333;
      outline: none;
      resize: none;
    }

    .pdf-field:focus {
      border-color: var(--field-focus);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 0 2px rgba(19, 82, 166, 0.2);
    }

    .file-field {
      padding: 0.2em;
      font-size: clamp(9px, 0.9vw, 12px);
      background: rgba(255, 255, 255, 0.72);
    }
