<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редакция</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-color: #1a1a1a;
      color: #c7c7c7;
      font-family: "Roboto Slab", serif;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .box {
      border: 1px solid #333;
      background-color: rgba(40, 40, 40, 0.8);
      border-radius: 8px;
      padding: 24px;
      max-width: 560px;
      width: 100%;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 14px;
      font-family: "Playfair Display", serif;
      color: #c7c7c7;
    }
    p {
      margin: 0 0 18px;
      color: #a8a8a8;
      font-size: 18px;
    }
    a {
      color: #8a6e2f;
      text-decoration: none;
      border: 1px solid #8a6e2f;
      padding: 8px 12px;
      border-radius: 6px;
      display: inline-block;
    }
    a:hover {
      color: #c7c7c7;
      border-color: #c7c7c7;
    }
  </style>
</head>
<body>
  <main class="box">
    <h1>Редакция</h1>
    <p>Информация будет добавлена позднее</p>
    <a href="../../index.html">На главную</a>
  </main>
</body>
</html>
